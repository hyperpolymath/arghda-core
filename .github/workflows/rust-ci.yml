#
# Rust CI for arghda-core. Calls the estate's rust-ci-reusable bundle
# (replaces the per-repo copy-drifted rust-ci.yml — see
# hyperpolymath/standards §"RSR — Reusable workflows").
#
# Defaults match the standards reusable: cargo build / cargo test /
# cargo clippy (-- -D warnings) / cargo fmt --check. cargo audit and
# cargo tarpaulin are off by default to keep per-PR CI cheap; flip
# enable_audit / enable_coverage on the call below if the maintenance
# value tips.

name: Rust CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-ci:
    uses: hyperpolymath/standards/.github/workflows/rust-ci-reusable.yml@4630a123cd9053a7afb34e4813948acf93f3d18c
    permissions:
      contents: read
